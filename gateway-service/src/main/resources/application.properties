spring.application.name=gateway-service
server.port=${GATEWAY_PORT:8084}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.discovery.enabled=true
eureka.instance.prefer-ip-address=true

# --- ROUTES ---
# URIs are configurable: locally they use Eureka (lb://), on Render they use direct URLs.

# User service - auth + user management + profile
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:lb://USER-SERVICE}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service-users
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:lb://USER-SERVICE}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[2].id=user-service-profile
spring.cloud.gateway.routes[2].uri=${USER_SERVICE_URL:lb://USER-SERVICE}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/profile/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[7].id=user-service-orgs
spring.cloud.gateway.routes[7].uri=${USER_SERVICE_URL:lb://USER-SERVICE}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/organizations/**
spring.cloud.gateway.routes[7].filters[0]=AuthenticationFilter
# Site service
spring.cloud.gateway.routes[3].id=site-service
spring.cloud.gateway.routes[3].uri=${SITE_SERVICE_URL:lb://SITE-SERVICE}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/sites/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[4].id=admin-site-service
spring.cloud.gateway.routes[4].uri=${SITE_SERVICE_URL:lb://SITE-SERVICE}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/admin/sites/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# Log service
spring.cloud.gateway.routes[5].id=log-service
spring.cloud.gateway.routes[5].uri=${LOG_SERVICE_URL:lb://LOG-SERVICE}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/logs/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter

# Alert service
spring.cloud.gateway.routes[6].id=alert-service
spring.cloud.gateway.routes[6].uri=${ALERT_SERVICE_URL:lb://ALERT-SERVICE}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/alerts/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter

# Logging configuration
logging.level.com.risktrace.gateway_service=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

