spring.application.name=log-service
server.port=${LOG_SERVICE_PORT:8087}

# Log-service stores logs in the database provided via MONGODB_URI (e.g. Atlas)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/logdb}

# Secondary data source: Points to the same Atlas DB to find site API keys
app.sitedb.uri=${MONGODB_URI:mongodb://localhost:27017/sitedb}