spring.application.name=log-service
server.port=${LOG_SERVICE_PORT:8087}

# Log-service stores logs in logdb
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/logdb}

# Secondary data source: read sites collection from sitedb for apiKey validation
# SiteRefRepository uses MongoTemplate pointed at sitedb
app.sitedb.uri=${SITEDB_URI:mongodb://localhost:27017/sitedb}